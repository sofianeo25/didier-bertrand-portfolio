<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <nav class="nav">
        <a href="index.html" class="nav-logo">Didier Bertrand</a>
        <ul class="nav-links">
            <li><a href="index.html#about">À Propos</a></li>
            <li><a href="index.html#portfolio">Portfolio</a></li>
            <li><a href="index.html#philosophy">Philosophie</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <a href="index.html#contact" class="nav-cta">Travailler ensemble</a>
    </nav>

    <section class="project-hero">
        <span class="project-hero-label reveal" id="sh-cat">Chargement...</span>
        <h1 class="project-hero-title reveal" id="sh-title">...</h1>
        <p class="project-hero-desc reveal" id="sh-desc">
        </p>
    </section>

    <!-- Loading State -->
    <div id="loading" style="text-align: center; padding: 4rem; color: var(--dust); width: 100%;">
        <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
        <p style="margin-top: 1rem; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;">Chargement de la galerie...</p>
    </div>

    <section class="gallery-masonry" id="gallery"></section>

    <footer>
        <div class="footer-logo">Didier Bertrand</div>
        <div class="footer-center">
            © 2024 Didier Bertrand · Tous droits réservés<br>
            1 Rue Xavier Mossmann, 68100 Mulhouse, France
        </div>
        <div class="footer-social">
            <a href="https://www.instagram.com/didier.bertrand.9235/" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" target="_blank" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="mailto:68Bertrad@gmail.com" title="Email"><i class="fa-solid fa-envelope"></i></a>
        </div>
    </footer>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lb-close">&times;</button>
        <button class="lightbox-prev" id="lb-prev"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="lightbox-img-container">
            <img class="lightbox-img" id="lb-img" src="" alt="">
        </div>
        <button class="lightbox-next" id="lb-next"><i class="fa-solid fa-chevron-right"></i></button>
        <div class="lightbox-counter" id="lb-counter"></div>
    </div>

    <!-- Scripts Généraux -->
    <script>
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            dot.style.left = mx + 'px'; dot.style.top = my + 'px';
        });
        (function animRing() {
            rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
            ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
            requestAnimationFrame(animRing);
        })();

        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    obs.unobserve(e.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    </script>

    <!-- Supabase Dynamic Script -->
    <script>
        const SUPABASE_URL = 'https://cgbtecyaubttcxtxtciy.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_l30XmcbQTtlRv_cRuJT8Tg_LjiV4DWf';
        let db = null;
        try {
            if (window.supabase) db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch(e) { console.error(e); }

        const urlParams = new URLSearchParams(window.location.search);
        const seriesId = urlParams.get('id');

        window.lbImagesUrls = [];
        window.currentIdx = 1;

        async function init() {
            if(!seriesId || !supabase) {
                document.getElementById('sh-title').innerText = "Série introuvable ou erreur de base de données";
                document.getElementById('loading').style.display = 'none';
                return;
            }

            try {
                // 1. Fetch Series info
                const { data: sData, error: sErr } = await db.from('series').select('*').eq('id', seriesId).single();
                if(sErr || !sData) {
                    document.getElementById('sh-title').innerText = "Série introuvable";
                    document.getElementById('loading').style.display = 'none';
                    return;
                }

                document.title = sData.title + " — Didier Bertrand";
                document.getElementById('sh-cat').innerText = sData.cat || 'Série Photographique';
                document.getElementById('sh-title').innerText = sData.title;
                if (sData.desc) {
                    document.getElementById('sh-desc').innerText = sData.desc;
                } else {
                    document.getElementById('sh-desc').style.display = "none";
                }

                // 2. Fetch Images directly by composing URLs from folder
                const { data: files, error: fErr } = await db.storage.from('portfolio_images').list(sData.slug);
                document.getElementById('loading').style.display = 'none';

                if(fErr || !files || files.length === 0) {
                     document.getElementById('gallery').innerHTML = "<div style='grid-column:1/-1;text-align:center;width:100%;color:var(--dust);'>Aucune image dans cette série.</div>";
                     return;
                }

                const imgFiles = files.filter(f => f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i));
                imgFiles.sort((a,b) => a.name.localeCompare(b.name));

                const gallery = document.getElementById('gallery');
                const lbImg = document.getElementById('lb-img');
                const lb = document.getElementById('lightbox');
                const counter = document.getElementById('lb-counter');

                imgFiles.forEach((file, index) => {
                    const { data } = db.storage.from('portfolio_images').getPublicUrl(`${sData.slug}/${file.name}`);
                    const src = data.publicUrl;
                    window.lbImagesUrls.push(src);

                    const div = document.createElement('div');
                    div.className = 'gallery-item reveal';
                    div.innerHTML = `<img src="${src}" alt="${sData.title} ${index+1}" loading="lazy">`;
                    div.querySelector('img').onclick = () => window.openLb(index + 1);
                    gallery.appendChild(div);
                    if (typeof obs !== 'undefined') obs.observe(div);
                });

                // ─── LIGHTBOX LOGIC ───
                window.openLb = function(idx) {
                    window.currentIdx = idx;
                    lb.classList.add('active');
                    updateLb();
                    document.body.style.overflow = 'hidden';
                };

                window.closeLb = function() {
                    lb.classList.remove('active');
                    document.body.style.overflow = 'auto';
                    setTimeout(() => lbImg.classList.remove('loaded'), 400);
                };

                window.updateLb = function() {
                    lbImg.src = window.lbImagesUrls[window.currentIdx - 1];
                    counter.style.display = 'none';
                };

                document.getElementById('lb-close').onclick = window.closeLb;
                document.getElementById('lb-prev').onclick = () => { 
                    window.currentIdx = window.currentIdx > 1 ? window.currentIdx - 1 : window.lbImagesUrls.length; 
                    window.updateLb(); 
                };
                document.getElementById('lb-next').onclick = () => { 
                    window.currentIdx = window.currentIdx < window.lbImagesUrls.length ? window.currentIdx + 1 : 1; 
                    window.updateLb(); 
                };
                
                document.addEventListener('keydown', e => {
                    if (!lb.classList.contains('active')) return;
                    if (e.key === 'Escape') window.closeLb();
                    if (e.key === 'ArrowLeft') { window.currentIdx = window.currentIdx > 1 ? window.currentIdx - 1 : window.lbImagesUrls.length; window.updateLb(); }
                    if (e.key === 'ArrowRight') { window.currentIdx = window.currentIdx < window.lbImagesUrls.length ? window.currentIdx + 1 : 1; window.updateLb(); }
                });
                lb.addEventListener('click', e => {
                    if (e.target === lb) window.closeLb();
                });
            } catch(e) {
                console.error("Erreur de chargement de la série:", e);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('sh-title').innerText = "Erreur de chargement";
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
