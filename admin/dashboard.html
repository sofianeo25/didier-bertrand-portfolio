<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration — Tableau de bord</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/admin/admin.css">
    <!-- Intégration Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Navigation -->
    <nav class="admin-nav">
        <div class="admin-logo">Didier Bertrand <span style="font-size:0.6rem; color:var(--copper);">Admin</span></div>
        <div class="admin-nav-right">
            <a href="../index.html" target="_blank">Voir le site</a>
            <button class="btn-logout" id="logout-btn">Déconnexion <i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </nav>

    <!-- Conteneur principal -->
    <div class="container">
        <div class="header-actions">
            <div>
                <h1 class="page-title">Séries & Collections</h1>
                <p style="color:var(--dust); margin-top:0.5rem; font-size: 0.9rem;">Gérez le contenu de votre portfolio professionnel.</p>
            </div>
            <a href="/admin/editor.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Nouvelle Série</a>
        </div>

        <div class="grid" id="series-grid">
            <!-- Loader -->
            <div style="grid-column: 1 / -1; text-align: center; padding: 4rem; color: var(--dust);">
                <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top: 1rem;">Chargement des séries...</p>
            </div>
            <!-- Les séries seront injectées ici par JS -->
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cgbtecyaubttcxtxtciy.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_l30XmcbQTtlRv_cRuJT8Tg_LjiV4DWf';
        let db = null;
        try {
            if (window.supabase) db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch(e) { console.error(e); }
        
        // Mock data fallback if Supabase is not configured
        const MOCK_DATA = [
            { id: 1, title: 'Nature', cat: 'Série Photographique', desc: 'L\'immensité sauvage capturée dans sa forme la plus brute...', cover: '../projet-portefolio/nature/images/image_1.jpg', images_count: 33 },
            { id: 2, title: 'Creative', cat: 'Série Photographique', desc: 'L\'expérimentation visuelle absolue...', cover: '../projet-portefolio/creative/images/image_1.jpg', images_count: 10 },
            { id: 3, title: 'Fashion', cat: 'Série Photographique', desc: 'L\'élégance capturée dans l\'instant...', cover: '../projet-portefolio/fashion/images/image_1.jpg', images_count: 4 },
        ];

        // Auth Check
        async function checkAuth() {
            if (!db) {
                if (!localStorage.getItem('admin_token')) window.location.href = '/admin/index.html';
                return true;
            }
            const { data: { session } } = await db.auth.getSession();
            if (!session) window.location.href = '/admin/index.html';
        }
        
        // Initialize
        checkAuth().then(loadSeries);

        let globalSeries = [];

        // Load Series
        async function loadSeries() {
            if (db) {
                const { data, error } = await db.from('series').select('*').order('order_index', { ascending: true }).order('created_at', { ascending: false });
                if (error) console.error(error);
                else globalSeries = data;
            } else {
                globalSeries = MOCK_DATA; // Fallback demo
            }
            renderGrid();
        }

        // Render Grid
        function renderGrid() {
            const grid = document.getElementById('series-grid');
            if (globalSeries.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 4rem; color:var(--dust); border: 1px dashed rgba(0,0,0,0.2);">Aucune série trouvée. Cliquez sur "Nouvelle Série" pour commencer.</div>`;
                return;
            }

            grid.innerHTML = globalSeries.map((s, index) => `
                <div class="card">
                    <div class="card-img-wrapper" style="position:relative;">
                        <img src="${s.cover || 'https://via.placeholder.com/600x400?text=Pas+d\'image'}" alt="${s.title}" class="card-img">
                        <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); color:white; padding: 0.2rem 0.6rem; border-radius:4px; font-size:0.8rem; font-weight:bold;">#${index + 1}</div>
                    </div>
                    <div class="card-content">
                        <div style="font-size:0.6rem; letter-spacing:0.1em; color:var(--copper); text-transform:uppercase; margin-bottom:0.5rem;">${s.cat || 'Série'} • ${s.images_count || 0} photos</div>
                        <h3 class="card-title">${s.title}</h3>
                        <p class="card-desc">${s.desc.substring(0, 100)}${s.desc.length > 100 ? '...' : ''}</p>
                        <div class="card-actions" style="gap: 0.5rem;">
                            <button onclick="moveSeries(${index}, -1)" class="btn btn-outline" style="min-width:30px; padding:0.5rem;" ${index===0?'disabled':''} title="Monter"><i class="fa-solid fa-arrow-up"></i></button>
                            <button onclick="moveSeries(${index}, 1)" class="btn btn-outline" style="min-width:30px; padding:0.5rem;" ${index===globalSeries.length-1?'disabled':''} title="Descendre"><i class="fa-solid fa-arrow-down"></i></button>
                            <a href="/admin/editor.html?id=${s.id}" class="btn btn-outline" style="flex:1; justify-content:center; padding:0.5rem;"><i class="fa-solid fa-pen"></i></a>
                            <button onclick="deleteSeries(${s.id})" class="btn btn-danger" style="min-width:30px; padding:0.5rem;" title="Supprimer"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Reorder Series
        window.moveSeries = async function(index, direction) {
            if (index + direction < 0 || index + direction >= globalSeries.length) return;
            
            // Swap array positions
            const temp = globalSeries[index];
            globalSeries[index] = globalSeries[index + direction];
            globalSeries[index + direction] = temp;
            
            renderGrid(); // Immediate UI update
            
            if (db) {
                // Bulk update using individual update calls to avoid NOT NULL constraints on other columns during upsert
                try {
                    await Promise.all(
                        globalSeries.map((s, i) => db.from('series').update({ order_index: i }).eq('id', s.id))
                    );
                } catch (error) {
                    console.error("Erreur d'ordre:", error);
                    alert("Erreur lors de la sauvegarde de l'ordre: " + error.message);
                    loadSeries(); // Reload from DB to fix desync
                }
            }
        };

        // Global Delete Function
        window.deleteSeries = async function(id) {
            if(!confirm('Êtes-vous sûr de vouloir supprimer cette série et toutes ses photos ? Cette action est irréversible.')) return;
            
            if (!db) {
                alert("Mode démo : Suppression simulée pour l'ID " + id);
            } else {
                const { error } = await db.from('series').delete().eq('id', id);
                if (error) alert("Erreur lors de la suppression : " + error.message);
                else loadSeries(); // Refresh
            }
        };

        // Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            if (db) await db.auth.signOut();
            else localStorage.removeItem('admin_token');
            window.location.href = '/admin/index.html';
        });
    </script>
</body>
</html>
